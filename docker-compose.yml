services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # PostgreSQL + PostGIS (tùy chọn — nếu muốn DB trong Docker thay vì cài local)
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: flood_rescue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
