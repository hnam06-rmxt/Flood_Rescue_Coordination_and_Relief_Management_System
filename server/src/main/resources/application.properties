spring.application.name=flood-rescue-system

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flood_rescue_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

app.jwt.secret=${APP_JWT_SECRET:0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF}
app.jwt.access-expiration=${APP_JWT_ACCESS_EXPIRATION:900000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000}
# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===== Redis Configuration =====
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# ===== Rate limiting (Redis) =====
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=120

# ===== PostGIS spatial queries =====
# Bật sau khi chạy sql/postgis_enable.sql trên PostgreSQL
app.spatial.postgis-enabled=true

# Cache TTL (seconds)
app.cache.ttl.dashboard=60
app.cache.ttl.shelters=300
app.cache.ttl.flood-alerts=120
app.cache.ttl.rescue-teams=180

# ===== Cloudinary Configuration =====
# Set these environment variables before starting the server.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:ddm4n4gcs}
cloudinary.api-key=${CLOUDINARY_API_KEY:394414941634526}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:6x2qYE-dgO9Gg-wQOt8vhFKMGv4}

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB
