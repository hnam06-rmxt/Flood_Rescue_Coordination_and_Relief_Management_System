spring.application.name=flood-rescue-system

# ===== Server =====
server.port=${PORT:8080}

# ===== Database: Supabase PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flood_rescue_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF}
app.jwt.access-expiration=${APP_JWT_ACCESS_EXPIRATION:86400000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# ===== CORS =====
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000}

# ===== Swagger / OpenAPI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===== Redis: Upstash Redis =====
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=5000ms

spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# ===== Rate limiting =====
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-minute=${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:120}

# ===== Spatial / PostGIS =====
# Render/Supabase deploy: keep false unless PostGIS extension is enabled.
app.spatial.postgis-enabled=${APP_SPATIAL_POSTGIS_ENABLED:false}

# ===== Cache TTL seconds =====
app.cache.ttl.dashboard=${APP_CACHE_TTL_DASHBOARD:60}
app.cache.ttl.shelters=${APP_CACHE_TTL_SHELTERS:300}
app.cache.ttl.flood-alerts=${APP_CACHE_TTL_FLOOD_ALERTS:120}
app.cache.ttl.rescue-teams=${APP_CACHE_TTL_RESCUE_TEAMS:180}

# ===== Cloudinary =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:ddm4n4gcs}
cloudinary.api-key=${CLOUDINARY_API_KEY:394414941634526}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== Multipart Upload =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB